<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión – ReserCEEYS UNP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-card shadow-lg">
    <!-- Logo / Cabecera -->
    <div class="login-header">
      <div class="login-logo">UNP</div>
      <h2 class="fw-bold mt-2 mb-0">ReserCEEYS</h2>
      <p class="small opacity-75">Sistema de Reservas — Facultad de Economía</p>
    </div>

    <div class="login-body-inner p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for cat, msg in messages %}
            <div class="alert alert-{{ cat }} py-2">{{ msg }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div class="mb-3">
          <label class="form-label fw-semibold">Correo electrónico</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
            <input type="email" name="email" class="form-control" placeholder="usuario@unp.edu.pe" required autofocus/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
          </div>
        </div>
        <button type="submit" class="btn btn-unp w-100 py-2 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
        </button>
      </form>

      <p class="text-center text-muted small mt-3 mb-0">
        Cuenta demo: <code>admin@unp.edu.pe</code> / <code>admin123</code>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

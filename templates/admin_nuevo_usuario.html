{% extends 'base.html' %}
{% block title %}Nuevo Usuario – ReserCEEYS{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-header fw-semibold">
        <i class="bi bi-person-plus me-2"></i>Nuevo Usuario
      </div>
      <div class="card-body">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nombre completo</label>
            <input type="text" name="nombre" class="form-control" required maxlength="100"/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Correo electrónico</label>
            <input type="email" name="email" class="form-control" required/>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control" required minlength="6"/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Rol</label>
            <select name="rol" class="form-select">
              <option value="usuario">Usuario (solo lectura)</option>
              <option value="admin">Administrador</option>
            </select>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-unp">
              <i class="bi bi-check-lg me-1"></i>Crear Usuario
            </button>
            <a href="{{ url_for('admin_usuarios') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
